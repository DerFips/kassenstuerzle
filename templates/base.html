<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Kassenstürzle</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <!-- ① Theme BEFORE CSS to prevent flash of wrong theme -->
  <script>(function(){var t=localStorage.getItem('ks_theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})()</script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow" id="mainNav">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="/"><i class="fas fa-wallet me-2 text-warning"></i>Kassenstürzle</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link rounded px-3 {% if active=='month' %}active{% endif %}" href="/"><i class="fas fa-calendar-alt me-1"></i>Monat</a></li>
        <li class="nav-item"><a class="nav-link rounded px-3 {% if active=='overview' %}active{% endif %}" href="/overview"><i class="fas fa-chart-bar me-1"></i>Übersicht</a></li>
        <li class="nav-item"><a class="nav-link rounded px-3 {% if active=='settings' %}active{% endif %}" href="/settings"><i class="fas fa-cog me-1"></i>Einstellungen</a></li>
        <li class="nav-item d-flex align-items-center ms-1">
          <button id="themeToggleBtn" onclick="toggleTheme()" title="Dark/Light Mode umschalten"
            class="btn btn-link nav-link px-2 py-1" style="font-size:1.1rem;color:rgba(255,255,255,.85)">
            <i id="themeIcon" class="fas fa-sun"></i>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<div class="container-fluid px-3 px-md-4 py-3 py-md-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg,type='success'){const id='t'+Date.now();const ic=type==='success'?'fa-check-circle':type==='warning'?'fa-exclamation-circle':'fa-times-circle';document.getElementById('toast-container').insertAdjacentHTML('beforeend',`<div id="${id}" class="toast align-items-center text-bg-${type} border-0 show mb-2" role="alert"><div class="d-flex"><div class="toast-body"><i class="fas ${ic} me-2"></i>${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="this.closest('.toast').remove()"></button></div></div>`);setTimeout(()=>{const e=document.getElementById(id);if(e)e.remove();},4000);}
function toggleTheme(){
  const next=document.documentElement.getAttribute('data-bs-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-bs-theme',next);
  localStorage.setItem('ks_theme',next);
  const ic=document.getElementById('themeIcon');
  if(ic) ic.className=next==='dark'?'fas fa-moon':'fas fa-sun';
  window.dispatchEvent(new CustomEvent('ks:themechange',{detail:{theme:next}}));
}
// Set correct icon on every page load
document.addEventListener('DOMContentLoaded',function(){
  const ic=document.getElementById('themeIcon');
  if(ic) ic.className=localStorage.getItem('ks_theme')==='dark'?'fas fa-moon':'fas fa-sun';
});
function fmt(n){return Number(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
