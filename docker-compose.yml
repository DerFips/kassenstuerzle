version: "3.9"
services:
  kassenstuerzle:
    build: .
    container_name: kassenstuerzle
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - kassenstuerzle_data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/kassenstuerzle.db

volumes:
  kassenstuerzle_data:
